    function alignTo5Min(timeRange) {
      // 如果输入为空或者不包含 '-'，直接原样返回
      if (!timeRange || typeof timeRange !== 'string' || !timeRange.includes('-')) {
          return timeRange;
      }

      const [startStr, endStr] = timeRange.split('-');

      // 处理单个时间字符串的内部函数
      const processTime = (tStr) => {
          const [h, m] = tStr.split(':').map(Number);
          
          // 如果已经是整5分钟，直接返回原格式
          if (m % 5 === 0) {
              return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          }
          
          // 向下取整到5的倍数 (例如 28 -> 25, 33 -> 30)
          let alignedM = Math.floor(m / 5) * 5;
          let alignedH = h;
          
          // 处理跨小时退回的情况 (例如 06:02 -> 退回5分钟变成 05:55)
          if (alignedM < 0) {
              alignedM += 60;
              alignedH -= 1;
          }
          
          // 补零并返回
          return `${String(alignedH).padStart(2, '0')}:${String(alignedM).padStart(2, '0')}`;
      };

      // 分别处理开始和结束时间，然后拼回去
      return `${processTime(startStr)}-${processTime(endStr)}`;
  }

    // 从JSON文件加载数据
    async function loadData() {
        try {
            // 同时请求两个 JSON 文件
            const [sleepResponse, dayResponse] = await Promise.all([
                fetch('json/diff_analysis_sleep.json'),
                fetch('json/diff_analysis_day.json')
            ]);
            
            if (!sleepResponse.ok || !dayResponse.ok) {
                throw new Error('Network response was not ok');
            }
            
            const sleepData = await sleepResponse.json();
            const dayData = await dayResponse.json();
            
            // 合并数据
            originData = sleepData.map(sleepSample => {
                // 找到对应的白天样本
                const daySample = dayData.find(day => day.name === sleepSample.name);
                if (daySample) {
                    // 合并 window 数组
                    sleepSample.window = [...sleepSample.window, ...daySample.window];
                }
                return sleepSample;
            });

            // 整体拉齐时间
            originData.forEach(sample => {
                sample.window.forEach(item => {
                  item.time = alignTo5Min(item.time);
                });
                
                // 检查重复的时间窗口
                const timeSet = new Set();
                let hasDuplicate = false;
                sample.window.forEach(item => {
                    if (timeSet.has(item.time)) {
                        console.error(`样本 ${sample.name} 存在重复的时间窗口: ${item.time}`);
                        hasDuplicate = true;
                    }
                    timeSet.add(item.time);
                });
                
                if (hasDuplicate) {
                    // alert(`样本 ${sample.name} 存在重复的时间窗口，请检查数据`);
                }
            });  

            console.log('数据加载成功:', originData);
            processData();
        } catch (error) {
            console.error('加载数据失败:', error);
            alert('加载数据失败，请检查JSON文件路径是否正确');
        }
    }

                    const startMinute = minute.toString().padStart(2, '0');
                    const endHour = (hour + Math.floor((minute + 5) / 60)).toString().padStart(2, '0');
                    const endMinute = ((minute + 5) % 60).toString().padStart(2, '0');
                    const endTime = endHour === '24' ? '24:00' : `${endHour}:${endMinute}`;
                    windows.push(`${startHour}:${startMinute}-${endTime}`);

            }
            return windows;

              // toFixed(2) 会将数字保留两位小数
              return value.toFixed(2); 
            },
            show: true
          },
          series: [
            {
              name: '心率差异',
              type: 'heatmap',
              data: heatmapData3,
              label: {
                show: false,
                fontSize: 10,
                formatter: function(params) {
                  // 找到对应的数据项以获取flag信息
                  let icon = '';
                  const sample = originData[params.value[1]];
                  if (sample) {
                    const windowItem = sample.window.find(item => item.time === timeWindows[params.value[0]]);
                    if (windowItem) {
                      icon = windowItem.flag === 'sleep' ? '🌙' : '☀️';
                    }
                  }
                  return icon;
                }
              },
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
              }
            }
          ]
        };
        
        // 热力图4配置 (RR间期差异)
        var option4 = {
          tooltip: {
            position: 'top',
            formatter: function(params) {
              if (params.value[2] === -1) {
                return `${sampleNames[params.value[1]]}<br/>${timeWindows[params.value[0]]}<br/>无数据`;
              }
              // 找到对应的数据项以获取flag信息
              let flagInfo = '';
              let icon = '';
              const sample = originData[params.value[1]];
              if (sample) {
                const windowItem = sample.window.find(item => item.time === timeWindows[params.value[0]]);
                if (windowItem) {
                  flagInfo = windowItem.flag === 'sleep' ? '睡眠' : '白天';
                  icon = windowItem.flag === 'sleep' ? '🌙 ' : '☀️ ';
                }
              }
              return `${sampleNames[params.value[1]]}<br/>${icon}${timeWindows[params.value[0]]} (${flagInfo})<br/>RR间期差异: ${params.value[2].toFixed(5)}`;
            }
          },
          grid: {
            height: '80%',
            width: '100%',
            top: '0%',
            left: '1%',
            containLabel: true
          },
          dataZoom: [
            {
              type: 'slider',
              show: true,
              xAxisIndex: [0],
              start: 0,
              end: 20, // 初始显示50%的窗口
              zoomLock: false // 锁定缩放，只能拖动
            },
            {
              type: 'inside',
              xAxisIndex: [0],
              start: 0,
              end: 20,
              zoomLock: true // 锁定缩放，只能拖动
            }
          ],
          xAxis: {
            type: 'category',
            data: timeWindows,
            splitArea: {
              show: true
            },
            splitLine: {
              show: true,
              lineStyle: {
                color: '#000',
                width: 1
              }
            },
            axisTick: {
              show: true
            },
            axisLabel: {
              rotate: 0,
              interval: 5 // 每12个窗口显示一个标签（每小时）
            }
          },
          yAxis: {
            type: 'category',
            data: sampleNames,
            splitArea: {
              show: true
            },
            splitLine: {
              show: true,
              lineStyle: {
                color: '#000',
                width: 1
              }
            }
          },
          visualMap: {
            min: 0,
            max: fixedMaxValue2,
            calculable: true,
            orient: 'horizontal',
            left: 'center',
            bottom: '8%',
            inRange: {
              color: ['rgba(212,220,247,1)', '#5070dd']
            },
            text: ['max', 'min'], // 这里的 text 必须有两个值占位，formatter 才会生效
            formatter: function(value) {
              // toFixed(2) 会将数字保留两位小数
              return value.toFixed(2); 
            },
            show: true
          },
          series: [
            {
              name: 'RR间期差异',
              type: 'heatmap',
              data: heatmapData4,
              label: {
                show: false,
                fontSize: 10,
                formatter: function(params) {
                  // 找到对应的数据项以获取flag信息
                  let icon = '';
                  const sample = originData[params.value[1]];
                  if (sample) {
                    const windowItem = sample.window.find(item => item.time === timeWindows[params.value[0]]);
                    if (windowItem) {
                      icon = windowItem.flag === 'sleep' ? '🌙' : '☀️';
                    }
                  }
                  return icon;
                }
              },
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
              }
            }
          ]
        };

        // 初始化两个热力图实例
        myChart3 = echarts.init(document.getElementById('container3'));
        myChart4 = echarts.init(document.getElementById('container4'));

        if (option3 && typeof option3 === 'object') {
          myChart3.setOption(option3);
        }

        if (option4 && typeof option4 === 'object') {
          myChart4.setOption(option4);
        }
      
        window.addEventListener('resize', function() {
          myChart1.resize();
          myChart2.resize();
          myChart3.resize();
          myChart4.resize();
        });

    }  

    window.onload = function() {
        loadData();
    };

  </script>
