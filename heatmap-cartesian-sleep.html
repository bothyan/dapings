    function alignTo5Min(timeRange) {
      // 如果输入为空或者不包含 '-'，直接原样返回
      if (!timeRange || typeof timeRange !== 'string' || !timeRange.includes('-')) {
          return timeRange;
      }

      const [startStr, endStr] = timeRange.split('-');

      // 处理单个时间字符串的内部函数
      const processTime = (tStr) => {
          const [h, m] = tStr.split(':').map(Number);
          
          // 如果已经是整5分钟，直接返回原格式
          if (m % 5 === 0) {
              return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          }
          
          // 向下取整到5的倍数 (例如 28 -> 25, 33 -> 30)
          let alignedM = Math.floor(m / 5) * 5;
          let alignedH = h;
          
          // 处理跨小时退回的情况 (例如 06:02 -> 退回5分钟变成 05:55)
          if (alignedM < 0) {
              alignedM += 60;
              alignedH -= 1;
          }
          
          // 补零并返回
          return `${String(alignedH).padStart(2, '0')}:${String(alignedM).padStart(2, '0')}`;
      };

      // 分别处理开始和结束时间，然后拼回去
      return `${processTime(startStr)}-${processTime(endStr)}`;
  }

            originData = await response.json();

            originData.forEach(sample => {
                sample.window.forEach(item => {
                  item.time = alignTo5Min(item.time);
                });
            });

            processData();
        } catch (error) {
            console.error('加载数据失败:', error);
            alert('加载数据失败，请检查JSON文件路径是否正确');
        }
    }

                for (let minute = 0; minute < 60; minute += 5) {
                    const startHour = hour.toString().padStart(2, '0');
                    const startMinute = minute.toString().padStart(2, '0');
                    const endHour = (hour + Math.floor((minute + 5) / 60)).toString().padStart(2, '0');
                    const endMinute = ((minute + 5) % 60).toString().padStart(2, '0');
                    const endTime = endHour === '24' ? '24:00' : `${endHour}:${endMinute}`;
                    windows.push(`${startHour}:${startMinute}-${endTime}`);
                }
            }
            return windows;

                    maxDiff1 = window.ecg_ppg_gen_heart_rate_diff;
                }
            });
            
            timeWindows.forEach((timeWindow, timeIndex) => {
                const value = timeMap[timeWindow];

                    heatmapData1.push([timeIndex, sampleIndex, value]);
                } else {

                        itemStyle: {

                        }
