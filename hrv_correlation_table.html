<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRV特征相关性表格</title>
    <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .table-container {
            overflow-x: auto;
            margin: 0 auto;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1200px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
            white-space: nowrap;
        }
        .sample-name {
            font-weight: bold;
            background-color: #f9f9f9;
            white-space: nowrap;
            width: 100px;
        }
        .chart-cell {
            width: 120px;
            height: 100px;
            position: relative;
            min-width: 120px;
        }
        .chart-container {
            width: 100%;
            height: 100%;
        }
        .feature-name {
            /* writing-mode: vertical-rl; */
            text-orientation: mixed;
            white-space: nowrap;
            width: 120px;
            min-width: 120px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HRV特征个体内相关性</h1>
        <p>每一行代表一个样本，每一列代表一个HRV特征，每个单元格展示模型前后的相关性折线图</p>
    </div>

    <div class="table-container">
        <table id="correlation-table">
            <thead>
                <tr>
                    <th>样本/特征</th>
                    <!-- 特征名称将通过JavaScript动态添加 -->
                </tr>
            </thead>
            <tbody>
                <!-- 表格内容将通过JavaScript动态添加 -->
            </tbody>
        </table>
    </div>

    <script>
        // 加载JSON数据
        let hrv_correlation_data = null;

        // 从JSON文件加载数据
        async function loadData() {
            try {
                const response = await fetch('json/hrv_r_sleep_data.json');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                hrv_correlation_data = await response.json();
                console.log('数据加载成功:', hrv_correlation_data);
                initTable();
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败，请检查JSON文件路径是否正确');
            }
        }

        // 初始化表格
        function initTable() {
            const table = document.getElementById('correlation-table');
            const thead = table.querySelector('thead tr');
            const tbody = table.querySelector('tbody');
            
            // 提取特征列表
            const features = hrv_correlation_data[0].features.map(f => f.feature);
            
            // 计算每个特征的上升和下降样本数
            const featureStats = {};
            features.forEach(feature => {
                featureStats[feature] = { increased: 0, decreased: 0 };
            });
            
            hrv_correlation_data.forEach(sample => {
                sample.features.forEach(feature => {
                    const before = feature.correlations[0];
                    const after = feature.correlations[1];
                    if (after > before) {
                        featureStats[feature.feature].increased++;
                    } else if (after < before) {
                        featureStats[feature.feature].decreased++;
                    }
                });
            });
            
            // 添加特征列头
            features.forEach(feature => {
                const th = document.createElement('th');
                th.className = 'feature-name';
                th.innerHTML = `${feature}<br><span style="font-size: 12px; font-weight: normal;">上升: <span style="color: red;">${featureStats[feature].increased}</span>, 下降: <span style="color: green;">${featureStats[feature].decreased}</span></span>`;
                thead.appendChild(th);
            });
            
            // 添加样本行
            hrv_correlation_data.forEach((sample, sampleIndex) => {
                const tr = document.createElement('tr');
                
                // 计算上升和下降的数量
                let increased = 0;
                let decreased = 0;
                sample.features.forEach(feature => {
                    const before = feature.correlations[0];
                    const after = feature.correlations[1];
                    if (after > before) {
                        increased++;
                    } else if (after < before) {
                        decreased++;
                    }
                });
                
                // 添加样本名称单元格
                const sampleCell = document.createElement('td');
                sampleCell.className = 'sample-name';
                sampleCell.innerHTML = `${sample.sample_name}<br><span style="font-size: 12px; font-weight: normal;">上升: <span style="color: red;">${increased}</span>, 下降: <span style="color: green;">${decreased}</span></span>`;
                tr.appendChild(sampleCell);
                
                // 添加每个特征的图表单元格
                sample.features.forEach((feature, featureIndex) => {
                    const td = document.createElement('td');
                    td.className = 'chart-cell';
                    
                    // 创建图表容器
                    const chartContainer = document.createElement('div');
                    chartContainer.className = 'chart-container';
                    chartContainer.id = `chart-${sampleIndex}-${featureIndex}`;
                    td.appendChild(chartContainer);
                    
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            });
            
            // 初始化所有图表
            initCharts();
        }

        // 初始化图表
        function initCharts() {
            hrv_correlation_data.forEach((sample, sampleIndex) => {
                sample.features.forEach((feature, featureIndex) => {
                    const chartId = `chart-${sampleIndex}-${featureIndex}`;
                    const chartContainer = document.getElementById(chartId);
                    
                    if (chartContainer) {
                        const chart = echarts.init(chartContainer);
                        
                        // 准备数据
                        const correlations = feature.correlations;
                        const data = [
                            {name: '模型前', value: correlations[0]},
                            {name: '模型后', value: correlations[1]}
                        ];
                        
                        // 颜色映射函数
                        function getColor(value) {
                            if (value >= 0.9) return '#52c41a'; // 深绿
                            if (value >= 0.8) return '#73d13d'; // 中绿
                            if (value >= 0.7) return '#95de64'; // 浅绿
                            if (value >= 0.6) return '#d9f7be'; // 极浅绿
                            if (value >= 0.5) return '#ffec3d'; // 黄色
                            if (value >= 0.4) return '#ffd666'; // 浅橙
                            if (value >= 0.3) return '#ffad66'; // 中橙
                            if (value >= 0) return '#ff8566'; // 红色
                            if (value >= -0.3) return '#ff4d4f'; // 深红
                            if (value >= -0.5) return '#cf1322'; // 暗红
                            return '#871f28'; // 最暗红
                        }
                        
                        // 图表配置
                        const option = {
                            grid: {
                                left: '3%',
                                right: '3%',
                                top: '3%',
                                bottom: '3%',
                                containLabel: true
                            },
                            xAxis: {
                                type: 'category',
                                data: ['模型前', '模型后'],
                                axisTick: {
                                    show: false
                                },
                                axisLabel: {
                                    show: false
                                }
                            },
                            yAxis: {
                                type: 'value',
                                min: -1,
                                max: 1,
                                interval: 0.5,
                                axisTick: {
                                    show: false
                                },
                                axisLabel: {
                                    fontSize: 8
                                },
                                splitLine: {
                                    lineStyle: {
                                        type: 'dashed',
                                        color: '#f0f0f0'
                                    }
                                }
                            },
                            series: [{
                                type: 'line',
                                data: data.map(item => item.value),
                                symbol: 'circle',
                                symbolSize: 6,
                                lineStyle: {
                                    lineWidth: 2,
                                    color: correlations[1] > correlations[0] ? '#ff0000' : '#008000'
                                },
                                itemStyle: {
                                    color: '#808080',
                                    borderColor: '#fff',
                                    borderWidth: 2
                                },
                                // markLine: {
                                //     silent: true,
                                //     lineStyle: {
                                //         color: '#999',
                                //         type: 'dashed'
                                //     },
                                //     data: [
                                //         {
                                //             yAxis: 0
                                //         }
                                //     ]
                                // }
                            }],
                            tooltip: {
                                trigger: 'axis',
                                formatter: function(params) {
                                    return params[0].name + ': ' + params[0].value.toFixed(4);
                                }
                            }
                        };
                        
                        // 应用配置
                        chart.setOption(option);
                        
                        // 响应式调整
                        window.addEventListener('resize', function() {
                            chart.resize();
                        });
                    }
                });
            });
        }

        // 页面加载完成后初始化
        window.onload = function() {
            loadData();
        };
    </script>
</body>
</html>
